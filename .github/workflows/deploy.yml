name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'Readme.md'
      - 'agent.md'
      - 'Agent.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  changelog:
    name: Update deploy changelog
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Generate changelog entry
        env:
          CURRENT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          if [ ! -f CHANGELOG.md ]; then
            cat <<'EOF' > CHANGELOG.md
          # Changelog

          Auto-generated deploy changelog entries.
          EOF
          fi

          previous_sha="$(grep -Eo '<!-- last-deploy-sha: [0-9a-f]{40} -->' CHANGELOG.md | sed -E 's/<!-- last-deploy-sha: ([0-9a-f]{40}) -->/\1/' | tail -n 1 || true)"
          range=""

          if [ -n "${previous_sha}" ] && git cat-file -e "${previous_sha}^{commit}" 2>/dev/null; then
            range="${previous_sha}..${CURRENT_SHA}"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            range="HEAD~1..HEAD"
          else
            range="${CURRENT_SHA}"
          fi

          commit_count="$(git rev-list --count "${range}")"
          if [ "${commit_count}" -eq 0 ]; then
            echo "No new commits in range ${range}; skipping changelog update."
            exit 0
          fi

          deployed_at="$(date -u +"%Y-%m-%d %H:%M:%SZ")"
          short_sha="$(git rev-parse --short "${CURRENT_SHA}")"
          compare_url="${SERVER_URL}/${REPOSITORY}/commit"

          entry_file="$(mktemp)"
          {
            echo "## Deploy ${deployed_at} (\`${short_sha}\`)"
            echo
            git log --reverse --pretty=format:'- %s ([%h]('"${compare_url}"'/%H))' "${range}"
            echo
            echo
            echo "<!-- last-deploy-sha: ${CURRENT_SHA} -->"
            echo
          } > "${entry_file}"

          cat "${entry_file}" >> CHANGELOG.md
          rm -f "${entry_file}"

      - name: Commit and push changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md
          git commit -m "docs(changelog): update deploy changelog"
          git push origin "HEAD:${REF_NAME}"
